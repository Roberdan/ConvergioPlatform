# Skill Protocol v1.0
name: release
version: 2.0.0
description: "Pre-release validation and version management via app-release-manager subagent"
domain: workflow
constitution-version: 2.0.0
license: MPL-2.0
copyright: "Roberto D'Angelo 2026"
repo: ConvergioPlatform
tools:
  - Agent
  - Bash
  - Read
model: claude-sonnet-4.6
min-context: 32000
arguments: optional
triggers:
  - "/release"
  - "/release {{version?}}"
  - "release version"
  - "cut a release"
provider-formats:
  - claude-code
  - copilot-cli
  - generic-llm
