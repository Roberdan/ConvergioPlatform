      - id: T12
        title: "Update TROUBLESHOOTING.md with agent entries"
        requirements: [F-13]
        executor: copilot
        model: claude-opus-4-6
        effort: S
        files:
          - TROUBLESHOOTING.md
        description: |
          Add agent-specific troubleshooting entries to TROUBLESHOOTING.md.
          Follow existing format: ## Problem: → **Symptom/Cause/Fix:**

          New entries:
          1. ## Problem: setup.sh fails
             Symptom: "ERROR: claude-config not found"
             Cause: ConvergioPlatform not cloned or wrong path
             Fix: git clone + verify path

          2. ## Problem: Agent not registering in IPC
             Symptom: agent-bridge.sh warns "daemon not reachable"
             Cause: daemon not running on port 8420
             Fix: ./daemon/start.sh, verify curl localhost:8420/api/ipc/status

          3. ## Problem: Hooks not firing
             Symptom: can use EnterPlanMode without block
             Cause: .claude/settings.json missing or not in project root
             Fix: run setup.sh, verify .claude/settings.json exists

          4. ## Problem: Skill sync shows 0 skills
             Symptom: agent-skills-sync.sh runs but no skills registered
             Cause: claude-core binary not on PATH or DB not accessible
             Fix: check which claude-core, check DASHBOARD_DB

          5. ## Problem: Agent heartbeat missing
             Symptom: agent shows stale last_heartbeat
             Cause: heartbeat script not running or daemon down
             Fix: check agent-heartbeat.sh manually, check daemon

          6. ## Problem: Copilot agent not visible
             Symptom: copilot-bridge.sh succeeds but GET /api/ipc/agents empty
             Cause: using /api/ipc/send instead of /api/ipc/agents/register
             Fix: ensure copilot-bridge.sh uses POST /api/ipc/agents/register

          If TROUBLESHOOTING.md doesn't exist, create it with header.
        verify:
          - "TROUBLESHOOTING.md exists"
          - "Contains all 6 new problem entries"
          - "Each entry has Symptom, Cause, Fix"
        test_criteria: |
