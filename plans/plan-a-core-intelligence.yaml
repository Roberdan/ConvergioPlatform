          4. gate_file_existence(task.files) -> GateResult
             - Verify all files in task.files[] exist on disk
          5. gate_line_count(changed_files) -> GateResult
             - Verify no file exceeds 250 lines
          6. gate_git_hygiene(worktree_path) -> GateResult
             - Clean working tree (no untracked/modified)
