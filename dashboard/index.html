<!DOCTYPE html>
<html lang="en" data-theme="editorial">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convergio Control Room</title>
  <!-- Maranello Luce Design System -->
  <link rel="stylesheet" href="node_modules/maranello-luce-design-business/dist/css/index.css">
  <link rel="stylesheet" href="node_modules/maranello-luce-design-business/dist/css/integration.css">
  <!-- Vendor: xterm.js (terminal view) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <!-- App styles (tokens only) -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- NaSra early-restore: prevent flash of wrong theme/font -->
  <script>
    (function() {
      var t = localStorage.getItem('mn-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
      var fs = localStorage.getItem('mn-font-size');
      if (fs) document.documentElement.style.fontSize = fs;
      var a11y = null;
      try { a11y = JSON.parse(localStorage.getItem('mn-a11y') || '{}'); } catch (e) { /* noop */ }
      if (a11y) {
        if (a11y.highContrast) document.documentElement.classList.add('mn-high-contrast');
        if (a11y.reducedMotion) document.documentElement.classList.add('mn-reduced-motion');
      }
    })();
  </script>

  <mn-app-shell id="shell" layout="side-detail">
    <nav slot="nav" class="mn-sidebar" aria-label="Main navigation">
      <a href="#overview" class="mn-sidebar__link mn-sidebar__link--active"
         data-view="overview" data-icon="dashboard">Overview</a>
      <a href="#plans" class="mn-sidebar__link"
         data-view="plans" data-icon="kanban">Plans</a>
      <a href="#mesh" class="mn-sidebar__link"
         data-view="mesh" data-icon="mesh">Mesh</a>
      <a href="#brain" class="mn-sidebar__link"
         data-view="brain" data-icon="brain">Brain</a>
      <a href="#ideas" class="mn-sidebar__link"
         data-view="ideas" data-icon="bulb">Ideas</a>
      <a href="#ipc" class="mn-sidebar__link"
         data-view="ipc" data-icon="router">IPC</a>
      <a href="#admin" class="mn-sidebar__link"
         data-view="admin" data-icon="settings">Admin</a>
      <a href="#terminal" class="mn-sidebar__link"
         data-view="terminal" data-icon="terminal">Terminal</a>
    </nav>

    <header slot="toolbar" class="mn-toolbar">
      <h1 class="mn-toolbar__title">Convergio Control Room</h1>
      <mn-theme-rotary></mn-theme-rotary>
    </header>

    <main slot="main" id="view-container"></main>
  </mn-app-shell>

  <mn-command-palette id="cmd-palette"></mn-command-palette>
  <mn-a11y></mn-a11y>

  <!-- Maranello JS bundle (IIFE) -->
  <script src="node_modules/maranello-luce-design-business/dist/iife/maranello.min.js"></script>
  <!-- Vendor: xterm.js (terminal view) -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <!-- App -->
  <script type="module" src="app.js"></script>
</body>
</html>
